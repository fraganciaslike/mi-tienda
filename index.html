<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAGANCIAS LIKE - Tienda Oficial</title>
    <style>
        /* ... TU CSS ORIGINAL ... */
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(to bottom, #050505, #111, #050505); color: white; overflow-x: hidden; }
        .promo-bar { background: #C8A45D; color: #000; text-align: center; padding: 8px 10px; font-size: 13px; font-weight: bold; letter-spacing: 1px; }
        .navbar { background: #000; display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; box-sizing: border-box; width: 100%; }
        .logo img { height: 50px; width: auto; object-fit: contain; }
        .productos { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 30px 15px; box-sizing: border-box; width: 100%; }
        .producto { background: #1b1b1b; width: 290px; border-radius: 15px; overflow: hidden; border: 1px solid #2a2a2a; display: flex; flex-direction: column; }
        .producto img { width: 100%; height: 280px; object-fit: cover; }
        .info { padding: 20px; flex: 1; }
        .precio { font-size: 24px; font-weight: bold; color: #C8A45D; margin: 10px 0; }
        .btn { display: block; text-align: center; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; background: #C8A45D; color: #000; }
        .btn:disabled { background: #555 !important; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="promo-bar">🔥 ENVÍO GRATIS EN COMPRAS MAYORES A $100.000 🔥</div>

<nav class="navbar">
    <div class="logo"><img src="logo.png" alt="Logo"></div>
</nav>

<section id="catalogo" class="contenedor-herramientas">
    <input type="text" class="buscador-input" id="buscador" onkeyup="filtrarCatalogo()" placeholder="Buscar perfume...">
</section>

<section class="productos" id="lista-productos">
    <p>Cargando fragancias...</p>
</section>

<script>
    // URL DE TU GOOGLE SHEETS PUBLICADO COMO CSV
    const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtH8U-YBPAs8iE9IrHQCpDr6gDxDezzkhKVfXqxxNzRn2pcHyrxKfNW4lIfoIig-8KlLtfstKF31Eo/pub?gid=1201638382&single=true&output=csv';

    async function cargarProductosDesdeSheet() {
        try {
            const res = await fetch(SPREADSHEET_URL);
            const data = await res.text();
            const filas = data.split('\n').slice(1); // Saltamos la fila de encabezados
            const contenedor = document.getElementById('lista-productos');
            contenedor.innerHTML = ''; 

            filas.forEach(fila => {
                if(!fila.trim()) return;
                const c = fila.split(',');
                
                // Mapeo según tu tabla (A:0, B:1, C:2, D:3, E:4, F:5, G:6)
                const nombre = c[0];
                const genero = c[1];
                const notas = c[2];
                const precio = parseInt(c[4]) || 0;
                const stock = parseInt(c[5]) || 0;
                const imagen = c[6];

                const div = document.createElement('div');
                div.className = 'producto';
                div.setAttribute('data-nombre', nombre.toLowerCase());
                div.setAttribute('data-genero', genero.toLowerCase());
                
                div.innerHTML = `
                    <img src="${imagen}" alt="${nombre}" loading="lazy">
                    <div class="info">
                        <h2>${nombre}</h2>
                        <p>${genero}</p>
                        <p class="precio">$${precio.toLocaleString('es-AR')}</p>
                        <button class="btn" ${stock <= 0 ? 'disabled' : ''} onclick="alert('Agregado: ${nombre}')">
                            ${stock > 0 ? 'Agregar al Carrito' : 'Sin Stock'}
                        </button>
                    </div>
                `;
                contenedor.appendChild(div);
            });
        } catch(e) { 
            console.error("Error al cargar productos:", e); 
            document.getElementById('lista-productos').innerHTML = '<p>Error al conectar con la base de datos.</p>';
        }
    }

    function filtrarCatalogo() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('.producto').forEach(p => {
            p.style.display = p.getAttribute('data-nombre').includes(busqueda) ? 'flex' : 'none';
        });
    }

    document.addEventListener('DOMContentLoaded', cargarProductosDesdeSheet);
</script>

</body>
</html>
